name = "fileverse"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "fileverse-db"
database_id = "8ed15584-e0a0-4f8c-93e3-79567604f1ff"
migrations_dir = "migrations"

[triggers]
crons = ["*/2 * * * *", "*/1 * * * *"]

[[rules]]
type = "Text"
globs = ["**/*.txt", "**/*.md"]

[vars]
NODE_ENV = "production"

[observability]
enabled = true
